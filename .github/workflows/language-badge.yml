name: Language Badge

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/badges/**"
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: language-badge
  cancel-in-progress: true

jobs:
  language-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute JavaScript percentage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .github/badges

          languages=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/languages")
          echo "Languages: ${languages}"

          pct=$(echo "${languages}" | jq -r '
            (to_entries | map(.value) | add) as $total
            | ((.JavaScript // 0) + (.JSX // 0)) as $js
            | if ($total // 0) == 0 then 0 else ($js / $total * 100) end
            | (. * 10 | round) / 10
          ')
          echo "JavaScript percentage: ${pct}"

          color=$(jq -rn --argjson p "${pct}" '
            if $p >= 90 then "brightgreen"
            elif $p >= 70 then "green"
            elif $p >= 50 then "yellowgreen"
            elif $p >= 30 then "yellow"
            else "orange" end')

          jq -n --arg msg "${pct}%" --arg color "${color}" '{
            schemaVersion: 1,
            label: "javascript",
            message: $msg,
            color: $color
          }' > .github/badges/javascript.json

          cat .github/badges/javascript.json

      - name: Publish updated badge
        env:
          BADGE_BRANCH: badges
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          path=".github/badges/javascript.json"
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          work="$(mktemp -d)"

          # Clone the badges branch if it exists, otherwise start an orphan branch.
          if git ls-remote --exit-code --heads "${repo_url}" "${BADGE_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${BADGE_BRANCH}" "${repo_url}" "${work}"
          else
            git clone --depth 1 "${repo_url}" "${work}"
            git -C "${work}" checkout --orphan "${BADGE_BRANCH}"
            git -C "${work}" rm -rf . >/dev/null 2>&1 || true
          fi

          # Identity must be configured on the cloned repo, not the workspace repo.
          git -C "${work}" config user.name "github-actions[bot]"
          git -C "${work}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "${work}/$(dirname "${path}")"
          cp "${path}" "${work}/${path}"
          git -C "${work}" add "${path}"

          if git -C "${work}" diff --cached --quiet; then
            echo "Badge is up to date; nothing to publish."
            exit 0
          fi

          git -C "${work}" commit -m "chore: update JavaScript language badge [skip ci]"
          git -C "${work}" push origin "HEAD:${BADGE_BRANCH}"
